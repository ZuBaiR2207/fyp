server.port=8085

management.endpoints.web.exposure.include=health

# Spring AI (set ANTHROPIC_API_KEY in environment)
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-haiku-4-5

# Stripe payment configuration for local development
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.success-url=http://localhost:5174/?payment=success
stripe.cancel-url=http://localhost:5174/?payment=cancel

