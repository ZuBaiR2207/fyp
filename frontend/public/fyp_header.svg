<svg width="100%" viewBox="0 0 690 210" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>FYP educational institution header</title>

  <!-- No background - fully transparent -->

  <!-- Open Book -->
  <rect x="82" y="90" width="56" height="36" rx="3" fill="white" fill-opacity="0.25"/>
  <line x1="110" y1="90" x2="110" y2="126" stroke="white" stroke-width="2"/>
  <!-- Left page lines -->
  <line x1="88" y1="100" x2="106" y2="100" stroke="white" stroke-width="1.2"/>
  <line x1="88" y1="107" x2="106" y2="107" stroke="white" stroke-width="1.2"/>
  <line x1="88" y1="114" x2="106" y2="114" stroke="white" stroke-width="1.2"/>
  <!-- Right page lines -->
  <line x1="114" y1="100" x2="132" y2="100" stroke="white" stroke-width="1.2"/>
  <line x1="114" y1="107" x2="132" y2="107" stroke="white" stroke-width="1.2"/>
  <line x1="114" y1="114" x2="132" y2="114" stroke="white" stroke-width="1.2"/>

  <!-- Graduation cap -->
  <polygon points="110,55 140,67 110,79 80,67" fill="white" fill-opacity="0.25"/>
  <rect x="104" y="67" width="12" height="14" rx="1" fill="white" fill-opacity="0.4"/>
  <line x1="140" y1="67" x2="140" y2="82" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <circle cx="140" cy="84" r="2.5" fill="white" opacity="0.8"/>

  <!-- Rays -->
  <line x1="110" y1="40" x2="110" y2="30" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="46" x2="137" y2="38" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="90" y1="46" x2="83" y2="38" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="148" y1="67" x2="158" y2="67" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="72" y1="67" x2="62" y2="67" stroke="white" stroke-width="1.5" opacity="0.5"/>

  <!-- FYP Name -->
  <text x="175" y="95" font-family="Georgia, serif" font-size="42" font-weight="700" fill="white" letter-spacing="3">FYP</text>

  <!-- Divider -->
  <line x1="175" y1="108" x2="630" y2="108" stroke="white" stroke-width="1.5" opacity="0.5"/>

  <!-- Tagline -->
  <text x="175" y="133" font-family="sans-serif" font-size="13" fill="white" fill-opacity="0.8" letter-spacing="2.5">KNOWLEDGE · INTEGRITY · EXCELLENCE</text>

  <!-- Est badge -->
  <rect x="175" y="148" width="96" height="24" rx="4" fill="white" fill-opacity="0.15"/>
  <text x="223" y="165" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" fill-opacity="0.9" letter-spacing="1">Est. 1998</text>

  <!-- Bottom strip -->
  <rect x="0" y="185" width="680" height="15" fill="black" fill-opacity="0.15"/>
  <text x="340" y="196" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white" fill-opacity="0.7" letter-spacing="2">SHAPING FUTURES SINCE 1998</text>
</svg>
