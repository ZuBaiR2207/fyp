<svg width="100%" viewBox="0 0 690 210" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>FYP educational institution header</title>

  <!-- Background -->
  <rect x="0" y="0" width="680" height="200" rx="12" fill="#c73e3e"/>
  <rect x="0" y="0" width="8" height="200" fill="#e05555"/>
  <rect x="672" y="0" width="8" height="200" fill="#e05555"/>
  <line x1="0" y1="18" x2="680" y2="18" stroke="#9a2e2e" stroke-width="0.5"/>
  <line x1="0" y1="182" x2="680" y2="182" stroke="#9a2e2e" stroke-width="0.5"/>

  <!-- Open Book -->
  <rect x="82" y="90" width="56" height="36" rx="3" fill="#f7c1c1"/>
  <line x1="110" y1="90" x2="110" y2="126" stroke="#c73e3e" stroke-width="2"/>
  <!-- Left page lines -->
  <line x1="88" y1="100" x2="106" y2="100" stroke="#c73e3e" stroke-width="1.2"/>
  <line x1="88" y1="107" x2="106" y2="107" stroke="#c73e3e" stroke-width="1.2"/>
  <line x1="88" y1="114" x2="106" y2="114" stroke="#c73e3e" stroke-width="1.2"/>
  <!-- Right page lines -->
  <line x1="114" y1="100" x2="132" y2="100" stroke="#c73e3e" stroke-width="1.2"/>
  <line x1="114" y1="107" x2="132" y2="107" stroke="#c73e3e" stroke-width="1.2"/>
  <line x1="114" y1="114" x2="132" y2="114" stroke="#c73e3e" stroke-width="1.2"/>

  <!-- Graduation cap -->
  <polygon points="110,55 140,67 110,79 80,67" fill="#f7c1c1"/>
  <rect x="104" y="67" width="12" height="14" rx="1" fill="#f09595"/>
  <line x1="140" y1="67" x2="140" y2="82" stroke="#f09595" stroke-width="1.5"/>
  <circle cx="140" cy="84" r="2.5" fill="#f09595"/>

  <!-- Rays -->
  <line x1="110" y1="40" x2="110" y2="30" stroke="#f09595" stroke-width="1.5" opacity="0.7"/>
  <line x1="130" y1="46" x2="137" y2="38" stroke="#f09595" stroke-width="1.5" opacity="0.7"/>
  <line x1="90" y1="46" x2="83" y2="38" stroke="#f09595" stroke-width="1.5" opacity="0.7"/>
  <line x1="148" y1="67" x2="158" y2="67" stroke="#f09595" stroke-width="1.5" opacity="0.7"/>
  <line x1="72" y1="67" x2="62" y2="67" stroke="#f09595" stroke-width="1.5" opacity="0.7"/>

  <!-- FYP Name -->
  <text x="175" y="95" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#FBEAF0" letter-spacing="3">FYP</text>

  <!-- Divider -->
  <line x1="175" y1="108" x2="630" y2="108" stroke="#e05555" stroke-width="1.5"/>

  <!-- Tagline -->
  <text x="175" y="133" font-family="sans-serif" font-size="13" fill="#f7c1c1" letter-spacing="2.5">KNOWLEDGE · INTEGRITY · EXCELLENCE</text>

  <!-- Est badge -->
  <rect x="175" y="148" width="96" height="24" rx="4" fill="#9a2e2e"/>
  <text x="223" y="165" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#f7c1c1" letter-spacing="1">Est. 1998</text>

  <!-- Bottom strip -->
  <rect x="0" y="185" width="680" height="15" rx="0" fill="#6b1f1f" opacity="0.7"/>
  <text x="340" y="196" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#f09595" letter-spacing="2">SHAPING FUTURES SINCE 1998</text>
</svg>
